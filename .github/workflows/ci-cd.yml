name: BCK CI/CD

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go mod download
      - run: go test ./... -count=1 -race -coverprofile=coverage.out
      - run: go vet ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with: { name: coverage, path: coverage.out }

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: cd web && npm ci
      - run: cd web && npm run build
      - run: cd web && npm run lint 2>/dev/null || true

  build:
    needs: [test-go, test-web]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backup-api, backup-worker, backup-scheduler, backup-agent]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile.${{ matrix.service == 'backup-api' && 'api' || matrix.service == 'backup-worker' && 'worker' || matrix.service == 'backup-scheduler' && 'scheduler' || 'agent' }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: test-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile.web
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/backup-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build, build-web]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
      - run: helm upgrade --install bck ./deployments/helm -n backup-manager --create-namespace
