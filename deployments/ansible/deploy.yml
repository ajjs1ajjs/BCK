---
- name: Deploy BCK Backup Manager
  hosts: backup_servers
  become: true
  vars:
    bck_version: "1.0.0"
    bck_install_dir: "/opt/bck"
    compose_file: "docker-compose.yml"

  tasks:
    - name: Install Docker prerequisites
      apt:
        name: [docker.io, docker-compose, python3-docker]
        state: present

    - name: Create BCK directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ bck_install_dir }}"
        - "{{ bck_install_dir }}/configs"
        - "/var/lib/backupmanager/repos"

    - name: Deploy docker-compose
      copy:
        src: "../deployments/docker-compose.yml"
        dest: "{{ bck_install_dir }}/docker-compose.yml"

    - name: Deploy config
      template:
        src: "config.example.yaml.j2"
        dest: "{{ bck_install_dir }}/configs/config.yaml"

    - name: Deploy env file
      template:
        src: ".env.j2"
        dest: "{{ bck_install_dir }}/.env"

    - name: Pull Docker images
      docker_compose:
        project_src: "{{ bck_install_dir }}"
        state: present
        pull: yes

    - name: Start services
      docker_compose:
        project_src: "{{ bck_install_dir }}"
        state: present

    - name: Run database migrations
      docker_container:
        name: bck-migrate
        image: "bck/backup-api:{{ bck_version }}"
        command: ["/usr/local/bin/migrate", "up"]
        env:
          DATABASE_URL: "postgres://{{ db_user }}:{{ db_password }}@postgres:5432/backupmanager?sslmode=disable"
        networks:
          - name: bck_default
        state: started
        cleanup: yes
