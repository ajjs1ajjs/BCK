services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backupmanager
      POSTGRES_USER: backup
      POSTGRES_PASSWORD: backup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backup -d backupmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup-api:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: backupmanager
      DB_USER: backup
      DB_PASSWORD: backup
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      STORAGE_LOCAL_PATH: /var/lib/backupmanager/repos
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: debug
      LOG_FORMAT: console
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - repo_data:/var/lib/backupmanager/repos

  backup-worker:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: backupmanager
      DB_USER: backup
      DB_PASSWORD: backup
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_LOCAL_PATH: /var/lib/backupmanager/repos
      LOG_LEVEL: debug
      LOG_FORMAT: console
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - repo_data:/var/lib/backupmanager/repos

  backup-scheduler:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.scheduler
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: backupmanager
      DB_USER: backup
      DB_PASSWORD: backup
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: debug
      LOG_FORMAT: console
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backup-ui:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backup-api:8080/api/v1
    depends_on:
      - backup-api

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  redis_data:
  repo_data:
  prometheus_data:
