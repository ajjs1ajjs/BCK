apiVersion: v2
name: bck-backup-manager
description: BCK Backup Manager - enterprise backup management system
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - backup
  - restore
  - disaster-recovery

maintainers:
  - name: BCK Team

dependencies:
  - name: postgresql
    version: "15.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "19.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
