{{- define "bck.labels" -}}
app.kubernetes.io/name: {{ .Chart.Name }}
app.kubernetes.io/version: {{ .Chart.AppVersion }}
app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels: {{ include "bck.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backup-api
  template:
    metadata:
      labels:
        app: backup-api
    spec:
      containers:
      - name: api
        image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
        ports:
        - containerPort: 8050
        env:
        - name: SERVER_PORT
          value: "8050"
        - name: DB_HOST
          value: {{ .Values.config.database.host | quote }}
        - name: DB_PORT
          value: {{ .Values.config.database.port | quote }}
        - name: DB_NAME
          value: {{ .Values.config.database.name | quote }}
        - name: DB_USER
          value: {{ .Values.config.database.user | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-db
              key: password
        - name: REDIS_HOST
          value: {{ .Values.config.redis.host | quote }}
        - name: REDIS_PORT
          value: {{ .Values.config.redis.port | quote }}
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-auth
              key: jwt-secret
        - name: STORAGE_LOCAL_PATH
          value: {{ .Values.config.storage.localPath | quote }}
        resources: {{ toYaml .Values.resources.api | nindent 10 }}
        livenessProbe:
          httpGet: { path: /api/v1/health, port: 8050 }
        readinessProbe:
          httpGet: { path: /api/v1/ready, port: 8050 }
        volumeMounts:
        - name: repo-data
          mountPath: /var/lib/backupmanager/repos
      volumes:
      - name: repo-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-repo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels: {{ include "bck.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.autoscaling.worker.minReplicas }}
  selector:
    matchLabels:
      app: backup-worker
  template:
    metadata:
      labels:
        app: backup-worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
        env:
        - name: DB_HOST
          value: {{ .Values.config.database.host | quote }}
        - name: DB_PORT
          value: {{ .Values.config.database.port | quote }}
        - name: DB_NAME
          value: {{ .Values.config.database.name | quote }}
        - name: DB_USER
          value: {{ .Values.config.database.user | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-db
              key: password
        - name: REDIS_HOST
          value: {{ .Values.config.redis.host | quote }}
        - name: REDIS_PORT
          value: {{ .Values.config.redis.port | quote }}
        - name: STORAGE_LOCAL_PATH
          value: {{ .Values.config.storage.localPath | quote }}
        resources: {{ toYaml .Values.resources.worker | nindent 10 }}
        volumeMounts:
        - name: repo-data
          mountPath: /var/lib/backupmanager/repos
      volumes:
      - name: repo-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-repo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scheduler
  labels: {{ include "bck.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-scheduler
  template:
    metadata:
      labels:
        app: backup-scheduler
    spec:
      containers:
      - name: scheduler
        image: "{{ .Values.image.scheduler.repository }}:{{ .Values.image.scheduler.tag }}"
        env:
        - name: DB_HOST
          value: {{ .Values.config.database.host | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-db
              key: password
        - name: REDIS_HOST
          value: {{ .Values.config.redis.host | quote }}
        resources: {{ toYaml .Values.resources.scheduler | nindent 10 }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  labels: {{ include "bck.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-ui
  template:
    metadata:
      labels:
        app: backup-ui
    spec:
      containers:
      - name: ui
        image: "{{ .Values.image.ui.repository }}:{{ .Values.image.ui.tag }}"
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://{{ .Release.Name }}-api:8050/api/v1"

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector: { app: backup-api }
  ports:
  - port: 8050

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui
spec:
  selector: { app: backup-ui }
  ports:
  - port: 3000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-repo
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db
data:
  password: {{ .Values.config.database.user | b64enc | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth
data:
  jwt-secret: {{ .Values.config.jwtSecret | default (randAlphaNum 32) | b64enc | quote }}
