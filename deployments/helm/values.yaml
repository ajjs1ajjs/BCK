replicaCount: 1

image:
  api:
    repository: bck/backup-api
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: bck/backup-worker
    tag: latest
    pullPolicy: IfNotPresent
  scheduler:
    repository: bck/backup-scheduler
    tag: latest
    pullPolicy: IfNotPresent
  ui:
    repository: bck/backup-ui
    tag: latest
    pullPolicy: IfNotPresent

service:
  api:
    type: ClusterIP
    port: 8050
  ui:
    type: ClusterIP
    port: 3000

config:
  jwtSecret: ""
  database:
    host: postgresql
    port: 5432
    name: backupmanager
    user: backup
  redis:
    host: redis-master
    port: 6379
  storage:
    type: local
    localPath: /var/lib/backupmanager/repos

resources:
  api:
    requests: { memory: "128Mi", cpu: "100m" }
    limits: { memory: "512Mi", cpu: "500m" }
  worker:
    requests: { memory: "256Mi", cpu: "200m" }
    limits: { memory: "1Gi", cpu: "1000m" }
  scheduler:
    requests: { memory: "64Mi", cpu: "50m" }
    limits: { memory: "256Mi", cpu: "200m" }

autoscaling:
  enabled: true
  worker:
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

persistence:
  enabled: true
  size: 100Gi
  storageClass: ""

postgresql:
  enabled: true
  auth:
    username: backup
    password: backup
    database: backupmanager
  primary:
    persistence:
      size: 20Gi

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 8Gi

ingress:
  enabled: false
  api:
    host: api.backup.local
  ui:
    host: ui.backup.local

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s

notifications:
  smtp:
    host: ""
    port: 587
  telegram:
    botToken: ""
