services:
  bck:
    build: .
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - PORT=9000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
    restart: unless-stopped
    volumes:
      - bck-data:/app/data
      - bck-backups:/app/backups
    networks:
      - bck-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-bckadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-bckpassword123}
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - bck-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - bck-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-bckgrafana}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - bck-net
    depends_on:
      - prometheus

volumes:
  bck-data:
  bck-backups:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  bck-net:
    driver: bridge
