services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-bckuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bckdbpass}
      POSTGRES_DB: ${DB_NAME:-bckdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  bck:
    build: .
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - PORT=9000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-bckuser}
      - DB_PASSWORD=${DB_PASSWORD:-bckdbpass}
      - DB_NAME=${DB_NAME:-bckdb}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - bck-data:/app/data

volumes:
  bck-data:
  postgres-data:
