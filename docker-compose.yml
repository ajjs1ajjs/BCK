version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bck
      POSTGRES_USER: bck
      POSTGRES_PASSWORD: bck_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bck"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bckadmin
      MINIO_ROOT_PASSWORD: bck_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  bckd:
    build:
      context: .
      dockerfile: Dockerfile
      target: bckd
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      BCK_JWT_SECRET: "change-this-in-production-please"
      RUST_LOG: info
    ports:
      - "9440:9440"
      - "9441:9441"
    volumes:
      - bck_data:/data
    command: [
      "bckd",
      "--config", "/etc/bck/config.toml",
      "--database-url", "postgres://bck:bck_secret@postgres:5432/bck"
    ]

volumes:
  pgdata:
  minio_data:
  bck_data:
