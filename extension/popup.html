<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
  body { width:320px; font-family:system-ui; background:#1a1a2e; color:#e0e0e0; margin:0; padding:12px }
  .header { display:flex; align-items:center; gap:8px; margin-bottom:12px }
  .header h2 { font-size:16px; margin:0 }
  .status { display:flex; align-items:center; gap:6px; padding:8px; background:#16213e; border-radius:8px; margin-bottom:8px }
  .status-dot { width:8px; height:8px; border-radius:50% }
  .status-dot.online { background:#22c55e }
  .status-dot.offline { background:#ef4444 }
  .btn { width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:600; margin-bottom:6px }
  .btn-primary { background:#e94560; color:#fff }
  .btn-secondary { background:#16213e; color:#e0e0e0 }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px }
  .stat { background:#16213e; padding:8px; border-radius:6px; text-align:center }
  .stat-value { font-size:18px; font-weight:bold; color:#e94560 }
  .stat-label { font-size:10px; color:#888 }
</style></head>
<body>
<div class="header">
  <span>🛡️</span><h2>BCK Manager</h2>
</div>
<div class="status">
  <span class="status-dot online" id="statusDot"></span>
  <span id="statusText">Checking...</span>
</div>
<button class="btn btn-primary" id="runBackup">▶ Run Manual Backup</button>
<button class="btn btn-secondary" id="bookmarkBackup">📑 Backup Bookmarks</button>
<button class="btn btn-secondary" id="openDashboard">📊 Open Dashboard</button>
<div class="stats">
  <div class="stat"><div class="stat-value" id="jobsVal">-</div><div class="stat-label">Jobs</div></div>
  <div class="stat"><div class="stat-value" id="reposVal">-</div><div class="stat-label">Repos</div></div>
  <div class="stat"><div class="stat-value" id="snapVal">-</div><div class="stat-label">Snapshots</div></div>
  <div class="stat"><div class="stat-value" id="storeVal">-</div><div class="stat-label">Storage</div></div>
</div>
<script src="popup.js"></script>
</body>
</html>
