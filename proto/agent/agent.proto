syntax = "proto3";

package agent;

option go_package = "github.com/ajjs1ajjs/BCK/proto/agent";

service Agent {
    // Health check
    rpc Ping(PingRequest) returns (PingResponse);

    // File scanning
    rpc Scan(ScanRequest) returns (stream FileEntry);

    // File streaming for backup
    rpc Backup(stream BackupChunk) returns (BackupSummary);

    // Restore
    rpc Restore(RestoreRequest) returns (stream RestoreProgress);

    // Execute command on agent
    rpc Exec(ExecRequest) returns (ExecResponse);
}

message PingRequest {}

message PingResponse {
    string version = 1;
    string hostname = 2;
    int64 uptime_seconds = 3;
}

message ScanRequest {
    string path = 1;
    repeated string exclude_patterns = 2;
}

message FileEntry {
    string path = 1;
    int64 size = 2;
    uint32 mode = 3;
    int64 mod_time_unix = 4;
    bool is_dir = 5;
    bool is_symlink = 6;
    string symlink_dest = 7;
    string checksum = 8;
    string error = 9;
}

message BackupChunk {
    string file_path = 1;
    bytes data = 2;
    int64 offset = 3;
    bool is_last = 4;
    uint32 mode = 5;
    int64 mod_time_unix = 6;
}

message BackupSummary {
    string snapshot_id = 1;
    int64 bytes_processed = 2;
    int64 files_processed = 3;
    bool success = 4;
    string error = 5;
}

message RestoreRequest {
    string snapshot_id = 1;
    string target_path = 2;
    repeated string files = 3;
}

message RestoreProgress {
    string file_path = 1;
    int64 bytes_restored = 2;
    int64 total_bytes = 3;
    bool complete = 4;
    string error = 5;
}

message ExecRequest {
    string command = 1;
    int32 timeout_seconds = 2;
}

message ExecResponse {
    int32 exit_code = 1;
    string stdout = 2;
    string stderr = 3;
    string error = 4;
}
